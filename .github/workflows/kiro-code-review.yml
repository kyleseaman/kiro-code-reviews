# ABOUTME: GitHub Actions workflow for automated AI code review on pull requests.
# ABOUTME: Spawns Kiro CLI agents to review diffs and post inline findings.
name: Kiro Code Review

on:
  pull_request:
    types: [opened, ready_for_review]
    paths-ignore:
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - 'README.md'
      - 'CHANGELOG.md'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true

concurrency:
  group: kiro-review-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    env:
      PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
      # Merge gate. "false" (default) = advisory: post findings, never fail the job.
      # "true" = block: a "needs rework" verdict fails this job, which blocks the merge
      # when the "Kiro Code Review" check is required via branch protection.
      # Set a repo/org Actions variable KIRO_REVIEW_BLOCK=true to enable.
      # Per-PR escape hatch: add the `skip-kiro-review` label.
      KIRO_REVIEW_BLOCK: ${{ vars.KIRO_REVIEW_BLOCK || 'false' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Kiro CLI
        run: curl -fsSL https://cli.kiro.dev/install | bash

      - name: Checkout PR branch (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr checkout "$PR_NUMBER"

      - name: Generate PR diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr diff "$PR_NUMBER" > /tmp/pr-raw.diff
          bash .github/scripts/annotate-diff.sh /tmp/pr-raw.diff > /tmp/pr.diff

      - name: Gather repo guidelines
        run: |
          # Flat guidelines: AGENTS.md, CLAUDE.md
          > /tmp/repo-guidelines.md
          for f in AGENTS.md CLAUDE.md; do
            if [ -f "$f" ]; then
              echo "--- ${f} ---" >> /tmp/repo-guidelines.md
              cat "$f" >> /tmp/repo-guidelines.md
              echo "" >> /tmp/repo-guidelines.md
            fi
          done
          if [ ! -s /tmp/repo-guidelines.md ]; then
            echo "No AGENTS.md or CLAUDE.md found." > /tmp/repo-guidelines.md
          fi

          # Kiro steering rules (separate, inclusion front-matter preserved)
          > /tmp/kiro-steering.md
          if ls .kiro/steering/*.md >/dev/null 2>&1; then
            for f in .kiro/steering/*.md; do
              echo "--- ${f} ---" >> /tmp/kiro-steering.md
              cat "$f" >> /tmp/kiro-steering.md
              echo "" >> /tmp/kiro-steering.md
            done
          else
            echo "No Kiro steering files found under .kiro/steering/." > /tmp/kiro-steering.md
          fi

      - name: Fetch issue context
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Extract linked issue numbers from PR body (e.g. "Closes #123", "Fixes #456")
          gh pr view "$PR_NUMBER" --json body -q '.body' > /tmp/pr-body.txt
          ISSUE_NUMS=$(grep -oiP '(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#\K[0-9]+' /tmp/pr-body.txt || true)

          if [ -n "$ISSUE_NUMS" ]; then
            echo "Linked issues found: $ISSUE_NUMS"
            echo "" > /tmp/issue-context.md
            for NUM in $ISSUE_NUMS; do
              echo "--- Issue #${NUM} ---" >> /tmp/issue-context.md
              gh issue view "$NUM" --json title,body -q '"# \(.title)\n\(.body)"' >> /tmp/issue-context.md 2>/dev/null || echo "(Could not fetch issue #${NUM})" >> /tmp/issue-context.md
              echo "" >> /tmp/issue-context.md
            done
          else
            echo "No linked issues found"
            echo "No linked issue context available." > /tmp/issue-context.md
          fi

      - name: Run Kiro code review
        env:
          GH_TOKEN: ${{ github.token }}
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
          KIRO_LOG_NO_COLOR: "1"
        run: |
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          PR_BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName -q '.headRefName')

          kiro-cli chat \
            --no-interactive \
            --agent code-reviewer \
            --trust-tools=read,write,grep,shell,subagent \
            "Review the code diff at /tmp/pr.diff. The linked issue context is at /tmp/issue-context.md. Flat repo guidelines (AGENTS.md, CLAUDE.md) are at /tmp/repo-guidelines.md, and Kiro steering rules are at /tmp/kiro-steering.md. The repo is ${REPO_OWNER}/${REPO_NAME} on branch ${PR_BRANCH}. Spawn the 4 review subagents in parallel (guidelines, steering, bugs, history), filter by confidence, merge findings, and write the result to /tmp/kiro-review.json"

      - name: Post review to PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/post-review.sh
